<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marseille Urgence Roleplay</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:Arial, sans-serif;
  background:#05070d;
  color:white;
}

/* HERO */
.hero{
  min-height:100vh;
  background:
    linear-gradient(rgba(5,10,20,0.82), rgba(5,10,20,0.96)),
    url("https://images.unsplash.com/photo-1519681393784-d120267933ba?auto=format&fit=crop&w=1600&q=80");

  background-size:cover;
  background-position:center;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:140px 20px 40px;
  position:relative;
}

/* LOGO */
.logo-container{
  position:absolute;
  top:25px;
  left:50%;
  transform:translateX(-50%);
}

.logo{
  width:120px;
  filter:drop-shadow(0 0 12px rgba(0,0,0,.9));
}

/* BADGE */
.badge{
  border:1px solid #d9a51c;
  padding:12px 25px;
  margin-bottom:35px;
  color:#d9a51c;
  font-size:12px;
  letter-spacing:5px;
}

/* TITRE PRO */
.title{
  font-family:'Arial Black', Impact, sans-serif;
  font-size:clamp(60px,10vw,120px);
  text-transform:uppercase;
  line-height:0.9;
}

.title .white{
  display:block;
  color:#ffffff;
  text-shadow:
    0 0 10px rgba(255,255,255,0.2),
    0 0 20px rgba(255,255,255,0.1);
}

.title .red{
  display:block;
  color:#ff1e2d;
  text-shadow:
    0 0 5px #ff0000,
    0 0 15px #ff0000,
    0 0 30px #ff0000,
    0 0 60px rgba(255,0,0,0.6);
}

/* TEXTE */
.subtitle{
  margin-top:25px;
  color:#b5bdcb;
  letter-spacing:4px;
  max-width:850px;
  line-height:1.7;
}

/* BOUTONS */
.buttons{
  margin-top:35px;
  display:flex;
  gap:22px;
  flex-wrap:wrap;
  justify-content:center;
}

.btn{
  padding:20px 35px;
  min-width:260px;
  text-decoration:none;
  font-weight:bold;
  letter-spacing:4px;
  transform:skewX(-10deg);
  display:inline-block;
}

.btn span{
  display:block;
  transform:skewX(10deg);
}

.discord{
  background:#ff1e2d;
  color:white;
}

.server{
  border:1px solid #d9a51c;
  color:#d9a51c;
}

/* SCREENSHOTS */
.screenshots{
  padding:60px 0;
  background:#060a14;
  overflow:hidden;
}

.screenshots h2{
  text-align:center;
  color:#d9a51c;
  letter-spacing:6px;
  font-size:14px;
  margin-bottom:30px;
}

.slider{overflow:hidden}

.track{
  display:flex;
  width:max-content;
  animation:scroll 25s linear infinite;
}

.track img{
  width:320px;
  height:200px;
  object-fit:cover;
  margin-right:15px;
  border-radius:5px;
  filter:brightness(.7);
  transition:.3s;
}

.track img:hover{
  filter:brightness(1);
  transform:scale(1.05);
}

@keyframes scroll{
  from{transform:translateX(0)}
  to{transform:translateX(-50%)}
}

/* MOBILE */
@media(max-width:768px){
  .hero{padding-top:120px}
  .logo{width:95px}
  .badge{font-size:10px;letter-spacing:3px}
  .title{font-size:55px}
  .subtitle{font-size:12px;letter-spacing:2px}
  .track img{width:250px;height:150px}
}
</style>
</head>

<body>

<section class="hero">

  <!-- LOGO -->
  <div class="logo-container">
    <img src="logo.png" alt="Logo Marseille Urgence RP" class="logo">
  </div>

  <!-- BADGE -->
  <div class="badge">
    🇫🇷 FIVEM · GTA V ROLEPLAY · SERVEUR URGENCE
  </div>

  <!-- TITRE -->
  <h1 class="title">
    <span class="white">MARSEILLE</span>
    <span class="red">URGENCE RP</span>
  </h1>

  <!-- TEXTE -->
  <p class="subtitle">
    POLICE · SAMU · POMPIERS · INTERVENTIONS RÉALISTES · EXPÉRIENCE RP
  </p>

  <!-- BOUTONS -->
  <div class="buttons">
    <a href="https://discord.gg/bVsrMMZ6cs" target="_blank" class="btn discord">
      <span>REJOINDRE LE DISCORD</span>
    </a>

    <a href="#" class="btn server">
      <span>VOIR LE SERVEUR</span>
    </a>
  </div>

</section>

<!-- SCREENSHOTS -->
<section class="screenshots">
  <h2>— SCREENSHOTS RP —</h2>

  <div class="slider">
    <div class="track">

      <img src="screen1.png">
      <img src="screen2.png">
      <img src="screen3.png">
      <img src="screen4.png">
      <img src="screen5.png">

      <img src="screen1.png">
      <img src="screen2.png">
      <img src="screen3.png">
      <img src="screen4.png">
      <img src="screen5.png">

    </div>
  </div>
</section>

</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marseille Urgence Roleplay</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: Impact, Arial Black, sans-serif;
  color: white;
  background: #05070d;
  overflow-x: hidden;
}

/* HERO */
.hero {
  min-height: 100vh;
  background:
    linear-gradient(rgba(3,7,15,0.82), rgba(3,7,15,0.88)),
    url("https://images.unsplash.com/photo-1518005020951-eccb494ad742?auto=format&fit=crop&w=1600&q=80");
  background-size: cover;
  background-position: center;
  position: relative;
}

/* NAVBAR */
.navbar {
  height: 75px;
  padding: 0 45px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.logo-text {
  font-size: 24px;
  letter-spacing: 7px;
}

.logo-text span {
  color: #d9a51c;
}

.menu {
  display: flex;
  gap: 42px;
  align-items: center;
}

.menu a {
  color: white;
  text-decoration: none;
  font-size: 12px;
  letter-spacing: 5px;
  opacity: 0.8;
}

.join-top {
  background: #d90d2f;
  padding: 18px 30px;
  transform: skewX(-12deg);
}

.join-top span {
  display: block;
  transform: skewX(12deg);
}

/* CONTENT */
.content {
  height: calc(100vh - 75px);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 20px;
}

.badge {
  border-top: 1px solid #b88a16;
  border-bottom: 1px solid #b88a16;
  padding: 12px 35px;
  color: #d9a51c;
  font-size: 12px;
  letter-spacing: 8px;
  margin-bottom: 20px;
  font-family: Arial, sans-serif;
}

.title-main {
  font-size: 120px;
  line-height: 0.9;
  letter-spacing: 4px;
  color: #f4f4f4;
}

.title-red {
  font-size: 110px;
  line-height: 0.85;
  letter-spacing: 2px;
  color: #d90d2f;
  text-shadow: 4px 4px 0 #30000a;
}

.subtitle {
  margin-top: 35px;
  font-family: Arial, sans-serif;
  font-size: 15px;
  letter-spacing: 7px;
  color: #9aa1ad;
}

.buttons {
  margin-top: 35px;
  display: flex;
  gap: 20px;
}

.btn {
  min-width: 250px;
  padding: 20px 35px;
  text-decoration: none;
  color: white;
  font-size: 14px;
  letter-spacing: 5px;
  font-family: Arial Black, Arial, sans-serif;
  transform: skewX(-12deg);
  transition: 0.3s;
}

.btn span {
  display: block;
  transform: skewX(12deg);
}

.discord {
  background: #d90d2f;
}

.discord:hover {
  background: #ff123c;
}

.server {
  border: 1px solid #d9a51c;
  color: #d9a51c;
}

.server:hover {
  background: #d9a51c;
  color: black;
}

/* MOBILE */
@media (max-width: 768px) {
  .navbar {
    padding: 20px;
  }

  .menu {
    display: none;
  }

  .logo-text {
    font-size: 18px;
    letter-spacing: 4px;
  }

  .title-main {
    font-size: 62px;
  }

  .title-red {
    font-size: 55px;
  }

  .badge {
    font-size: 10px;
    letter-spacing: 4px;
    padding: 10px;
  }

  .subtitle {
    font-size: 12px;
    letter-spacing: 4px;
  }

  .buttons {
    flex-direction: column;
  }

  .btn {
    min-width: 260px;
  }
}
</style>
</head>

<body>

<section class="hero">

  <nav class="navbar">
    <div class="logo-text"><span>MARSEILLE</span> URGENCE</div>

    <div class="menu">
      <a href="#">LE SERVEUR</a>
      <a href="#">SCREENSHOTS</a>
      <a href="#">STAFF</a>
      <a href="#">RÈGLEMENT</a>
      <a href="https://discord.gg/bVsrMMZ6cs" target="_blank" class="join-top">
        <span>REJOINDRE</span>
      </a>
    </div>
  </nav>

  <div class="content">

    <div class="badge">
      🇫🇷 FIVEM · GTA V ROLEPLAY · SERVEUR MARSEILLE
    </div>

    <h1 class="title-main">MARSEILLE</h1>
    <h2 class="title-red">URGENCE RP</h2>

    <p class="subtitle">
      FIVEPD V2 · POLICE · SAMU · POMPIERS · IMMERSION TOTALE
    </p>

    <div class="buttons">
      <a href="https://discord.gg/bVsrMMZ6cs" target="_blank" class="btn discord">
        <span>REJOINDRE LE DISCORD</span>
      </a>

      <a href="#" class="btn server">
        <span>VOIR LE SERVEUR</span>
      </a>
    </div>

  </div>

</section>

</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marseille Urgence Roleplay</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:Arial, sans-serif;
  background:#05070d;
  color:white;
}

/* HERO FIVEM */
.hero{
  min-height:100vh;

  background:
    linear-gradient(rgba(5,10,20,0.85), rgba(5,10,20,0.95)),
    url("https://images.unsplash.com/photo-1519681393784-d120267933ba?auto=format&fit=crop&w=1600&q=80");

  background-size:cover;
  background-position:center;

  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:20px;
}

/* TITRE */
.title{
  font-family:Impact, Arial Black;
  font-size:clamp(60px,10vw,120px);
  line-height:0.9;
}

.title span{
  color:#ff1e2d;
  text-shadow:4px 4px 0 #200006;
}

/* BADGE */
.badge{
  border:1px solid #d9a51c;
  padding:10px 25px;
  margin-bottom:30px;
  color:#d9a51c;
  font-size:12px;
  letter-spacing:5px;
}

/* TEXTE */
.subtitle{
  margin-top:20px;
  color:#b5bdcb;
  letter-spacing:4px;
  max-width:800px;
}

/* BOUTONS */
.buttons{
  margin-top:30px;
  display:flex;
  gap:20px;
  flex-wrap:wrap;
  justify-content:center;
}

.btn{
  padding:18px 30px;
  text-decoration:none;
  font-weight:bold;
  letter-spacing:4px;
  transform:skewX(-10deg);
}

.btn span{
  display:block;
  transform:skewX(10deg);
}

.discord{
  background:#ff1e2d;
  color:white;
}

.server{
  border:1px solid #d9a51c;
  color:#d9a51c;
}

/* SCREENSHOTS FIVEM */
.screenshots{
  padding:60px 0;
  background:#060a14;
  overflow:hidden;
}

.screenshots h2{
  text-align:center;
  color:#d9a51c;
  letter-spacing:6px;
  font-size:14px;
  margin-bottom:30px;
}

.slider{overflow:hidden}

.track{
  display:flex;
  width:max-content;
  animation:scroll 25s linear infinite;
}

.track img{
  width:320px;
  height:200px;
  object-fit:cover;
  margin-right:15px;
  border-radius:5px;
  filter:brightness(0.7);
  transition:0.3s;
}

.track img:hover{
  filter:brightness(1);
  transform:scale(1.05);
}

/* animation */
@keyframes scroll{
  from{transform:translateX(0)}
  to{transform:translateX(-50%)}
}

/* MOBILE */
@media(max-width:768px){
  .title{font-size:55px}
  .subtitle{font-size:12px;letter-spacing:2px}
  .track img{width:250px;height:150px}
}
</style>
</head>

<body>

<!-- ACCUEIL -->
<section class="hero">

  <div class="badge">
    🇫🇷 FIVEM · GTA V ROLEPLAY · SERVEUR URGENCE
  </div>

  <h1 class="title">
    MARSEILLE
    <span>URGENCE RP</span>
  </h1>

  <p class="subtitle">
    POLICE · SAMU · POMPIERS · INTERVENTIONS RÉALISTES · EXPÉRIENCE RP
  </p>

  <div class="buttons">
    <a href="https://discord.gg/bVsrMMZ6cs" target="_blank" class="btn discord">
      <span>REJOINDRE LE DISCORD</span>
    </a>

    <a href="#" class="btn server">
      <span>VOIR LE SERVEUR</span>
    </a>
  </div>

</section>

<!-- SCREENSHOTS -->
<section class="screenshots">

  <h2>— SCREENSHOTS RP —</h2>

  <div class="slider">
    <div class="track">

      <!-- ICI TES VRAIES IMAGES -->
      <img src="screen1.png">
      <img src="screen2.png">
      <img src="screen3.png">
      <img src="screen4.png">
      <img src="screen5.png">

      <!-- DUPLIQUÉ -->
      <img src="screen1.png">
      <img src="screen2.png">
      <img src="screen3.png">
      <img src="screen4.png">
      <img src="screen5.png">

    </div>
  </div>

</section>

</body>
</html>

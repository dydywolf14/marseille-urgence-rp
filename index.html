<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marseille Urgence Roleplay</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: Arial, sans-serif;
  background:#05070d;
  color:white;
}

/* HERO */
.hero {
  height:100vh;
  background:
    linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.9)),
    url("https://images.unsplash.com/photo-1518005020951-eccb494ad742?auto=format&fit=crop&w=1600&q=80");
  background-size:cover;
  background-position:center;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}

/* TITRES */
.title-main {
  font-size:90px;
  font-family: Impact;
}

.title-red {
  font-size:80px;
  color:#d90d2f;
}

/* TEXTE */
.subtitle {
  margin-top:20px;
  opacity:0.7;
  letter-spacing:3px;
}

/* BOUTONS */
.buttons {
  margin-top:30px;
}

.btn {
  padding:15px 30px;
  margin:10px;
  text-decoration:none;
  color:white;
  display:inline-block;
  font-weight:bold;
}

.discord {
  background:#d90d2f;
}

.server {
  border:1px solid gold;
  color:gold;
}

/* 🔥 SCREENSHOTS ANIMÉS */
.screenshots {
  background:#080c16;
  padding:60px 0;
  overflow:hidden;
}

.screenshots h2 {
  text-align:center;
  color:#d9a51c;
  letter-spacing:6px;
  font-size:14px;
  margin-bottom:30px;
}

.slider {
  width:100%;
  overflow:hidden;
}

.track {
  display:flex;
  width:max-content;
  animation:scroll 25s linear infinite;
}

.track img {
  width:320px;
  height:200px;
  object-fit:cover;
  margin-right:15px;
  filter:brightness(0.6);
  transition:0.3s;
}

.track img:hover {
  filter:brightness(1);
  transform:scale(1.05);
}

/* Animation */
@keyframes scroll {
  from { transform:translateX(0); }
  to { transform:translateX(-50%); }
}

/* MOBILE */
@media(max-width:768px){
  .title-main { font-size:50px; }
  .title-red { font-size:45px; }
}
</style>
</head>

<body>

<!-- ACCUEIL -->
<section class="hero">

  <h1 class="title-main">MARSEILLE</h1>
  <h2 class="title-red">URGENCE RP</h2>

  <p class="subtitle">
    Serveur FiveM RP Français • Police • SAMU • Pompiers
  </p>

  <div class="buttons">
    <a href="https://discord.gg/bVsrMMZ6cs" target="_blank" class="btn discord">
      Rejoindre le Discord
    </a>

    <a href="#" class="btn server">
      Voir le serveur
    </a>
  </div>

</section>

<!-- 🔥 SCREENSHOTS JUSTE EN DESSOUS -->
<section class="screenshots">

  <h2>— SCREENSHOTS DU SERVEUR —</h2>

  <div class="slider">
    <div class="track">

      <img src="https://images.unsplash.com/photo-1519501025264-65ba15a82390?auto=format&fit=crop&w=800&q=80">
      <img src="https://images.unsplash.com/photo-1494526585095-c41746248156?auto=format&fit=crop&w=800&q=80">
      <img src="https://images.unsplash.com/photo-1518005020951-eccb494ad742?auto=format&fit=crop&w=800&q=80">
      <img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?auto=format&fit=crop&w=800&q=80">
      <img src="https://images.unsplash.com/photo-1500534314209-a25ddb2bd429?auto=format&fit=crop&w=800&q=80">

      <!-- doublon pour effet infini -->
      <img src="https://images.unsplash.com/photo-1519501025264-65ba15a82390?auto=format&fit=crop&w=800&q=80">
      <img src="https://images.unsplash.com/photo-1494526585095-c41746248156?auto=format&fit=crop&w=800&q=80">
      <img src="https://images.unsplash.com/photo-1518005020951-eccb494ad742?auto=format&fit=crop&w=800&q=80">
      <img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?auto=format&fit=crop&w=800&q=80">
      <img src="https://images.unsplash.com/photo-1500534314209-a25ddb2bd429?auto=format&fit=crop&w=800&q=80">

    </div>
  </div>

</section>

</body>
</html>
